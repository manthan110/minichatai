<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <title>MiniChatAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0c0f;
      --surface:   #13151a;
      --border:    #1f2229;
      --accent:    #e8ff47;
      --accent2:   #47ffe0;
      --text:      #eceef2;
      --muted:     #565b6b;
      --user-bg:   #1a1d24;
      --bot-bg:    #111318;
      --radius:    14px;
      --font-display: 'Syne', sans-serif;
      --font-mono:    'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.6;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .shell {
      position: relative; z-index: 1;
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      max-width: 780px;
      margin: 0 auto;
      padding: 0 16px;
    }

   
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 0 18px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
    }

    .logo-mark {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 8px;
      display: grid; place-items: center;
      animation: pulse-mark 3s ease-in-out infinite;
    }

    @keyframes pulse-mark {
      0%, 100% { box-shadow: 0 0 0 0 rgba(232,255,71,.4); }
      50%       { box-shadow: 0 0 0 8px rgba(232,255,71,0); }
    }

    .logo-mark svg { width: 18px; height: 18px; }

    .logo-name {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 800;
      letter-spacing: .08em;
      color: var(--text);
    }

    .logo-name span { color: var(--accent); }

    .header-right { display: flex; align-items: center; gap: 12px; }

    .status-dot {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--muted); letter-spacing: .04em;
    }

    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #3ddc84;
      box-shadow: 0 0 6px #3ddc84;
      animation: blink 2.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; } 50% { opacity: .4; }
    }

    .btn-reset {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .06em;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }

    .btn-reset:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    #messages {
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .msg {
      display: flex;
      gap: 12px;
      animation: slide-in .3s cubic-bezier(.25,.8,.25,1) both;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      flex-shrink: 0;
      width: 32px; height: 32px;
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 13px; font-weight: 600;
    }

    .msg.user .avatar {
      background: var(--accent);
      color: #0b0c0f;
      font-family: var(--font-display);
    }

    .msg.bot .avatar {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--accent2);
    }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.65;
      font-size: 13.5px;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid #252830;
      border-top-right-radius: 4px;
      color: var(--text);
    }

    .msg.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: #c8cdd9;
    }

    .msg.bot .bubble code {
      background: #1a1d24;
      color: var(--accent2);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12.5px;
    }

    
    .typing-bubble {
      display: flex; align-items: center; gap: 5px;
      padding: 14px 18px;
    }

    .typing-bubble span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      display: inline-block;
      animation: bounce .9s ease-in-out infinite;
    }

    .typing-bubble span:nth-child(2) { animation-delay: .15s; }
    .typing-bubble span:nth-child(3) { animation-delay: .30s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); background: var(--accent); }
    }

   
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      text-align: center;
      padding: 40px 0;
      animation: fade-in .6s ease both;
    }

    @keyframes fade-in {
      from { opacity: 0; } to { opacity: 1; }
    }

    .empty-state .big-icon {
      font-size: 48px;
      filter: grayscale(1) opacity(.35);
      margin-bottom: 4px;
    }

    .empty-state h2 {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: .02em;
    }

    .empty-state p { font-size: 13px; max-width: 280px; }

    .suggestions {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
      margin-top: 8px;
    }

    .suggestion-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11.5px;
      padding: 6px 13px;
      border-radius: 20px;
      cursor: pointer;
      transition: border-color .2s, color .2s, background .2s;
    }

    .suggestion-chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(232,255,71,.05);
    }

    footer {
      padding: 16px 0 22px;
      border-top: 1px solid var(--border);
    }

    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 10px 10px 16px;
      transition: border-color .2s;
    }

    .input-wrap:focus-within {
      border-color: rgba(232,255,71,.4);
      box-shadow: 0 0 0 3px rgba(232,255,71,.06);
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13.5px;
      line-height: 1.5;
      resize: none;
      max-height: 140px;
      min-height: 22px;
    }

    #input::placeholder { color: var(--muted); }

    #send-btn {
      flex-shrink: 0;
      width: 36px; height: 36px;
      background: var(--accent);
      color: #0b0c0f;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      display: grid; place-items: center;
      transition: background .2s, transform .15s;
    }

    #send-btn:hover { background: #d4eb35; transform: scale(1.05); }
    #send-btn:active { transform: scale(.95); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }

    #send-btn svg { width: 16px; height: 16px; }

    .input-meta {
      display: flex; justify-content: space-between;
      padding: 6px 4px 0;
      font-size: 10.5px; color: var(--muted);
    }

    kbd {
      background: var(--border);
      color: var(--muted);
      padding: 1px 5px;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 10px;
    }

  
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .bubble p {
    margin-bottom: 12px;
  }
  .bubble p:last-child {
    margin-bottom: 0;
  }

  .bubble ul, .bubble ol {
    margin-left: 24px;
    margin-bottom: 12px;
  }
  .bubble li {
    margin-bottom: 4px;
  }

  .bubble pre {
    background-color: var(--bg);
    border: 1px solid var(--border);
    padding: 14px;
    border-radius: 8px;
    overflow-x: auto; 
    margin: 12px 0;
    font-family: var(--font-mono);
  }


  .bubble :not(pre) > code {
    background-color: var(--bg);
    color: var(--accent); 
    padding: 3px 6px;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 0.9em;
  }


  .bubble table {
    border-collapse: collapse;
    width: 100%;
    margin: 12px 0;
  }
  .bubble th, .bubble td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
  }
  </style>
</head>
<body>
<div class="shell">
  <header>
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0b0c0f" stroke-width="2.5" stroke-linecap="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="logo-name">MiniChatAI</span>
    </div>
    <div class="header-right">
      <span class="status-dot"><span class="dot"></span>online</span>
      <button class="btn-reset" onclick="resetChat()">↺ reset</button>
    </div>
  </header>

  <div id="messages">
    <div class="empty-state" id="empty">
      <div class="big-icon">◈</div>
      <h2>Ask me anything</h2>
      <div class="suggestions">
        <button class="suggestion-chip" onclick="sendSuggestion(this)">Explain quantum computing</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">Write a haiku about code</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">Debug my thinking</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">Best practices for REST APIs</button>
      </div>
    </div>
  </div>

  <footer>
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="Send a message…" autofocus></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-meta">
      <span>MiniChatAI</span>
      <span><kbd>Shift</kbd>+<kbd>Enter</kbd> new line &nbsp;·&nbsp; <kbd>Enter</kbd> send</span>
    </div>
  </footer>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');
  const emptyEl    = document.getElementById('empty');

marked.setOptions({
  highlight: function(code, lang) {
    const language = hljs.getLanguage(lang) ? lang : 'plaintext';
    return hljs.highlight(code, { language }).value;
  }
});

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function sendSuggestion(btn) {
    inputEl.value = btn.textContent;
    sendMessage();
  }

  function appendMessage(role, text) {
    if (emptyEl) emptyEl.remove();

    const wrapper = document.createElement('div');
    wrapper.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'U' : '◈';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

   if (role === 'bot') {
        bubble.innerHTML = marked.parse(text);
    } else {
        bubble.textContent = text;
    }

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrapper;
  }

  function showTyping() {
    const wrapper = document.createElement('div');
    wrapper.className = 'msg bot';
    wrapper.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '◈';

    const bubble = document.createElement('div');
    bubble.className = 'bubble typing-bubble';
    bubble.innerHTML = '<span></span><span></span><span></span>';

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage('user', text);
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      removeTyping();
      appendMessage('bot', data.response || data.error || 'Something went wrong.');
    } catch (err) {
      removeTyping();
      appendMessage('bot', '⚠ Network error. Is the server running?');
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  async function resetChat() {
    await fetch('/reset', { method: 'POST' });
    messagesEl.innerHTML = `
      <div class="empty-state" id="empty">
        <div class="big-icon">◈</div>
        <h2>Ask me anything</h2>
        <p>Powered by Claude — your intelligent, context-aware assistant.</p>
        <div class="suggestions">
          <button class="suggestion-chip" onclick="sendSuggestion(this)">Explain quantum computing</button>
          <button class="suggestion-chip" onclick="sendSuggestion(this)">Write a haiku about code</button>
          <button class="suggestion-chip" onclick="sendSuggestion(this)">Debug my thinking</button>
          <button class="suggestion-chip" onclick="sendSuggestion(this)">Best practices for REST APIs</button>
        </div>
      </div>`;
  }
</script>
</body>
</html>
